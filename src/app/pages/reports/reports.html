<div class="container py-4">

<div class="report-hero">

<div>

<span class="hero-tag">Expense Analytics</span>

<h2>📊 Expense Reports</h2>

<p>Track and analyse your spending.</p>

</div>

<div class="hero-icon">

<i class="bi bi-bar-chart-fill"></i>

</div>

</div>

<div class="row g-4 mt-4">

<div class="col-md-4">

<div class="stats-card red">

<small>Total Expense</small>

<h2>₹ {{ totalExpense }}</h2>

</div>

</div>

<div class="col-md-4">

<div class="stats-card blue">

<small>Today's Expense</small>

<h2>₹ {{ todayExpense }}</h2>

</div>

</div>

<div class="col-md-4">

<div class="stats-card green">

<small>This Month</small>

<h2>₹ {{ currentMonthExpense }}</h2>

</div>

</div>

</div>

<div class="row mt-4 g-4">

<div class="col-lg-8">

<div class="card">

<div class="card-header">

Monthly Expenses

</div>

<div class="card-body">

<canvas id="barChart"></canvas>

</div>

</div>

</div>

<div class="col-lg-4">

<div class="card">

<div class="card-header">

Expense Categories

</div>

<div class="card-body">

<canvas id="pieChart"></canvas>

</div>

</div>

</div>

</div>

<div class="card mt-4">

<div class="card-header">

Top Spending Categories

</div>

<div class="card-body">

<table class="table">

<thead>

<tr>

<th>Category</th>

<th class="text-end">Amount</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let c of topCategories">

<td>{{ c.category }}</td>

<td class="text-end">

₹ {{ c.amount }}

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>
